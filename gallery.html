<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./gallery-favicon.svg" />
    <title>Card Gallery · QA</title>
    <script>
      // Force German (source copy — worst case for label collisions) before
      // any module (and thus the i18n locale detection) loads.
      try { localStorage.setItem('worldpulse-locale', 'de'); } catch (e) {}
    </script>
    <style>
      :root {
        --bg: #05070c;
        --line: #1b1f29;
        --line-hi: #3a4356;
        --ink: #dfe3ec;
        --dim: #8b93a3;
        /* The loader globe's idle body blue (IMPLODE_STOPS[1.0] in
           useLoaderGlobe.ts) — the product's signature blue. */
        --accent: #3870f8;
        --accent-rgb: 56, 112, 248;

        /* Mirror the app's shared glassSurface (src/components/glass.ts) so the
           gallery chrome reads as the same material as the DEV overlays. Two
           fills — the app surface for large panes, a hair denser for controls
           and popovers that sit on top of them. */
        --glass-bg: rgba(14, 18, 28, 0.42);
        --glass-bg-strong: rgba(14, 18, 28, 0.55);
        --glass-blur: blur(16px) saturate(1.4);
        --glass-border: rgba(255, 255, 255, 0.16);
        --glass-shadow: 0 6px 22px rgba(0, 0, 0, 0.38);
        --glass-hi: inset 0 1px 0 rgba(255, 255, 255, 0.14);
        --radius: 14px;
        --radius-sm: 10px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        /* Render native chrome (the select popup, scrollbars, focus rings) in
           dark mode, so the OS-drawn dropdown list matches the glass theme
           instead of falling back to a light-grey panel. */
        color-scheme: dark;
      }
      /* Soft colour blooms behind everything, so the frosted panels have real
         content to refract — glass over a flat fill is just a grey box. Fixed
         and non-interactive; sits beneath the scrolling grid. */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          radial-gradient(58% 55% at 16% 10%, rgba(58, 92, 168, 0.22), transparent 70%),
          radial-gradient(52% 50% at 86% 18%, rgba(120, 74, 160, 0.18), transparent 70%),
          radial-gradient(60% 60% at 72% 96%, rgba(32, 104, 104, 0.16), transparent 72%),
          var(--bg);
      }

      /* Toolbar */
      #bar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: center;
        padding: 12px 16px;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border-bottom: 1px solid var(--glass-border);
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.35);
      }
      #bar input:not([type="checkbox"]), #bar select, #bar a.back {
        appearance: none;
        -webkit-appearance: none;
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        color: var(--ink);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        padding: 6px 10px;
        font: inherit;
        transition: border-color 0.14s ease, box-shadow 0.14s ease;
      }
      #bar a.back { text-decoration: none; display: inline-flex; align-items: center; }
      #bar input[type="search"] { min-width: 210px; }
      /* Custom chevron so the select keeps its frosted fill instead of the OS
         dropdown chrome that appearance:none strips. */
      #bar select {
        padding-right: 28px;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3.5 5 6.5 8 3.5' fill='none' stroke='%238b93a3' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
        background-repeat: no-repeat;
        background-position: right 9px center;
        cursor: pointer;
      }
      /* The popup list is OS-drawn (no backdrop-filter reaches it), but with
         color-scheme:dark plus these fills it reads as a solid dark panel in
         the theme rather than the default light-grey. */
      #bar select option {
        background: #10141f;
        color: var(--ink);
      }
      #bar select option:checked {
        background: rgba(var(--accent-rgb), 0.32);
        color: #fff;
      }
      #bar input:not([type="checkbox"]):hover, #bar select:hover, #bar a.back:hover,
      #bar input:not([type="checkbox"]):focus, #bar select:focus, #bar a.back:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
      }
      #bar input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        margin: 0;
        border-radius: 6px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        box-shadow: var(--glass-hi);
        cursor: pointer;
        position: relative;
        transition: border-color 0.14s ease, box-shadow 0.14s ease, background-color 0.14s ease;
      }
      #bar input[type="checkbox"]:hover { border-color: var(--accent); }
      #bar input[type="checkbox"]:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
      }
      #bar input[type="checkbox"]:checked {
        border-color: var(--accent);
        background-color: rgba(var(--accent-rgb), 0.3);
      }
      #bar input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 5px;
        height: 9px;
        border: solid #eaf1ff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      #bar label { display: inline-flex; gap: 6px; align-items: center; color: var(--dim); }
      #count { margin-left: auto; color: var(--dim); }

      /* Grid */
      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--tw, 320px), 1fr));
        gap: 22px;
        padding: 22px;
        align-items: start;
      }
      figure { margin: 0; cursor: pointer; outline: none; }
      figure canvas {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        background: #000;
        transition: border-color 0.16s ease, box-shadow 0.16s ease;
      }
      /* Hover lights the card rather than moving it: an accent rim plus a soft
         glow in the globe blue. */
      figure:hover canvas {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.45), 0 0 24px rgba(var(--accent-rgb), 0.32);
      }
      figure:focus-visible canvas {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(var(--accent-rgb), 0.6), 0 0 24px rgba(var(--accent-rgb), 0.32);
      }
      figcaption { padding: 6px 2px 0; }
      figcaption .top { color: var(--ink); word-break: break-all; }
      figcaption .idx { color: var(--dim); }
      figcaption .meta { margin-top: 4px; display: flex; gap: 8px; align-items: center; color: var(--dim); }
      figcaption .chip {
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        color: #05070c;
      }

      /* Right-click card menu */
      #ctxmenu {
        position: fixed;
        z-index: 30;
        min-width: 168px;
        padding: 5px;
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        box-shadow: var(--glass-shadow), var(--glass-hi);
      }
      #ctxmenu button {
        display: block;
        width: 100%;
        padding: 7px 10px;
        text-align: left;
        background: none;
        border: none;
        border-radius: 5px;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }
      #ctxmenu button:hover,
      #ctxmenu button:focus-visible { background: rgba(255, 255, 255, 0.09); outline: none; }

      /* Copy confirmation toast */
      #toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        z-index: 40;
        transform: translate(-50%, 8px);
        padding: 9px 16px;
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        color: var(--ink);
        box-shadow: var(--glass-shadow), var(--glass-hi);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
      #toast.show { opacity: 1; transform: translate(-50%, 0); }

      /* Lightbox */
      /* The overlay stays in the layout so open/close can animate; opacity +
         visibility (not display) carry the fade, and the backdrop blur ramps
         in. visibility flips to hidden only after the fade so the closed
         lightbox never steals clicks. */
      #lb {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        background: rgba(2, 3, 7, 0);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 220ms ease,
          background 260ms ease,
          backdrop-filter 260ms ease,
          -webkit-backdrop-filter 260ms ease,
          visibility 0s linear 260ms;
      }
      #lb.open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        background: rgba(2, 3, 7, 0.4);
        backdrop-filter: blur(22px) saturate(150%);
        -webkit-backdrop-filter: blur(22px) saturate(150%);
        transition:
          opacity 200ms ease,
          background 260ms ease,
          backdrop-filter 260ms ease,
          -webkit-backdrop-filter 260ms ease,
          visibility 0s;
      }
      #lb .stage {
        margin: auto;
        display: flex;
        gap: 24px;
        align-items: flex-start;
        padding: 28px 64px;
        max-width: 100%;
        max-height: 100%;
        transform: scale(0.955) translateY(10px);
        opacity: 0;
        transition:
          transform 320ms cubic-bezier(0.16, 1, 0.3, 1),
          opacity 220ms ease;
      }
      #lb.open .stage {
        transform: none;
        opacity: 1;
      }
      #lb canvas {
        height: min(90vh, 960px);
        width: auto;
        max-width: 58vw;
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        background: #000;
        box-shadow: var(--glass-shadow);
      }
      /* Prev/next: the freshly drawn card fades in. Toggled by a class the
         lightbox re-adds after a reflow, so mashing the arrows restarts it. */
      @keyframes lbCardIn { from { opacity: 0.3; } to { opacity: 1; } }
      #lb canvas.anim { animation: lbCardIn 220ms cubic-bezier(0.16, 1, 0.3, 1); }
      #lb .info {
        max-width: 340px;
        padding: 20px 22px;
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        box-shadow: var(--glass-shadow), var(--glass-hi);
      }
      #lb .info h2 { font-size: 16px; margin: 0 0 10px; color: #fff; line-height: 1.3; }
      #lb .info .row { margin: 6px 0; word-break: break-word; }
      #lb .info .k { color: var(--dim); }
      #lb .info .src { margin-top: 14px; white-space: pre-wrap; color: var(--dim); font-size: 12px; line-height: 1.5; }
      #lb button {
        background: var(--glass-bg-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        border-radius: 10px;
        box-shadow: var(--glass-shadow), var(--glass-hi);
        transition: border-color 0.14s ease, transform 0.14s ease;
      }
      #lb button:hover { border-color: var(--accent); transform: translateY(-1px); }
      /* The nav arrows are centred with translateY(-50%); fold the hover lift
         into that transform so they don't jump out of centre. */
      #lb .nav:hover { transform: translateY(calc(-50% - 1px)); }
      #lb .nav { position: fixed; top: 50%; transform: translateY(-50%); width: 42px; height: 58px; font-size: 22px; }
      #lb #prev { left: 16px; }
      #lb #next { right: 16px; }
      #lb #close { position: fixed; top: 16px; right: 16px; padding: 8px 12px; }
      #lb #download { position: fixed; top: 58px; right: 16px; padding: 8px 12px; }
      #lb #download:disabled { opacity: 0.5; cursor: progress; }

      /* Honour the OS "reduce motion" setting: cut the movement, keep the
         instant show/hide. */
      @media (prefers-reduced-motion: reduce) {
        #lb, #lb.open, #lb .stage, #lb.open .stage { transition-duration: 1ms; }
        #lb .stage, #lb.open .stage { transform: none; }
        #lb canvas.anim { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <a class="back" href="/" aria-label="Zurück zur App">← App</a>
      <input id="q" type="search" placeholder="Suche id / Titel…" autocomplete="off" />
      <label>Kategorie <select id="cat"></select></label>
      <label>Sortierung
        <select id="sort">
          <option value="newest">neueste</option>
          <option value="category">Kategorie</option>
          <option value="id">A–Z (id)</option>
        </select>
      </label>
      <label>Größe
        <select id="size">
          <option value="220">S</option>
          <option value="320" selected>M</option>
          <option value="460">L</option>
        </select>
      </label>
      <label><input id="live" type="checkbox" checked /> Live-Daten laden</label>
      <span id="count"></span>
    </div>

    <div id="grid"></div>

    <div id="lb" role="dialog" aria-modal="true" aria-label="Karten-Detailansicht">
      <button id="close">✕ Esc</button>
      <button id="download" aria-label="Karte als PNG herunterladen">⭳ PNG</button>
      <button id="prev" class="nav" aria-label="Zurück">‹</button>
      <button id="next" class="nav" aria-label="Weiter">›</button>
      <div class="stage">
        <canvas id="lbCanvas" width="768" height="960"></canvas>
        <div class="info" id="lbInfo"></div>
      </div>
    </div>

    <script type="module" src="/src/dev/gallery.ts"></script>
  </body>
</html>
