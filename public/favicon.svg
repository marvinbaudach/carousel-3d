<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3987e5"/>
      <stop offset="1" stop-color="#9085e9"/>
    </linearGradient>
  </defs>
  <!-- dark panel, same surface color as the app background -->
  <rect width="64" height="64" rx="14" fill="#05070c"/>
  <!-- dim globe: sphere with meridian and equator hints -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#27354d" stroke-width="3"/>
  <ellipse cx="32" cy="32" rx="9" ry="19" fill="none" stroke="#27354d" stroke-width="2"/>
  <!-- the pulse crossing the world -->
  <polyline points="6,32 22,32 27,20 35,44 40,32 58,32"
    fill="none" stroke="url(#p)" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
